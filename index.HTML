<!DOCTYPE html>
<html>

<head>
    <title>FreshMart Supermarket</title>

    <!-- Internal CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #2e8b57;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #3cb371;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        .container {
            padding: 20px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 20px;
            color: #2e8b57;
        }

        .products {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .card {
            background-color: white;
            width: 250px;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .price {
            color: green;
            font-size: 18px;
            font-weight: bold;
        }

        button {
            background-color: #2e8b57;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #228b22;
        }

        footer {
            background-color: #2e8b57;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <header>
        <h1>FreshMart Supermarket</h1>
        <p>Your One-Stop Grocery Store</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Offers</a>
        <a href="#">Contact</a>
    </nav>

    <div class="container">
        <h2 class="section-title">Our Products</h2>

        <div class="products">

            <div class="card">
                <img src="https://via.placeholder.com/250x150" alt="Apples">
                <h3>Fresh Apples</h3>
                <p class="price">$3.99 / kg</p>
                <button>Add to Cart</button>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/250x150" alt="Milk">
                <h3>Organic Milk</h3>
                <p class="price">$2.49 / litre</p>
                <button>Add to Cart</button>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/250x150" alt="Bread">
                <h3>Whole Wheat Bread</h3>
                <p class="price">$1.99</p>
                <button>Add to Cart</button>
            </div>

        </div>
    </div>

    <footer>
        <p>&copy; 2026 FreshMart Supermarket | All Rights Reserved</p>
    </footer>

</body>

</html>
